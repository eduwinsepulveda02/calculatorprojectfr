<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  
  <div>
    <img src="images/yakuzaimage.png" alt="logo" width="150"> 
    <input type="number" id="milesTraveled" placeholder="Enter miles">
    <input type="number" id="gallonsOfGasUsed" placeholder="Enter gallons of gas">
    <button onClick="calculate()">Calculate</button>
  </div>
  
  <script>
      function calculate(){
        let miles = parseFloat(document.getElementById('milesTraveled').value);
        let gas = parseFloat(document.getElementById('gallonsOfGasUsed').value);
        let milesPerGallon = miles / gas;
        alert('Your miles per gallon is: ' + milesPerGallon);
      }

  </script>
  
</body>
</html>
